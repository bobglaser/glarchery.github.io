<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <style>
    :root {
      --maize: #FFCB05;
      --maize-dark: #e6b800;
      --blue: #00274C;
      --blue-mid: #003d73;
      --blue-light: #1a5276;
      --white: #ffffff;
      --off-white: #f5f5f0;
      --text: #1a1a1a;
      --border: #d4a800;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: var(--off-white);
      color: var(--text);
      line-height: 1.7;
    }

    /* ── Header ── */
    header {
      background: var(--blue);
      border-bottom: 5px solid var(--maize);
      padding: 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
    }

    .site-brand {
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
    }

    .brand-icon {
      font-size: 2.4rem;
      line-height: 1;
    }

    .brand-text h1 {
      color: var(--maize);
      font-size: 1.6rem;
      font-weight: bold;
      letter-spacing: 0.03em;
      line-height: 1.1;
    }

    .brand-text .tagline {
      color: #aac4e0;
      font-size: 0.8rem;
      font-style: italic;
      letter-spacing: 0.08em;
    }

    /* ── Nav ── */
    nav {
      background: var(--blue-mid);
      border-top: 1px solid var(--blue-light);
    }

    nav ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      padding: 0 1.5rem;
      margin: 0;
    }

    nav li a {
      display: block;
      color: var(--white);
      text-decoration: none;
      padding: 0.75rem 1.1rem;
      font-family: Arial, sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }

    nav li a:hover {
      background: var(--maize);
      color: var(--blue);
    }

    /* ── Hero banner (home only) ── */
    .hero {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-mid) 60%, var(--blue-light) 100%);
      color: var(--white);
      text-align: center;
      padding: 4rem 2rem;
      border-bottom: 6px solid var(--maize);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "🏹";
      position: absolute;
      font-size: 18rem;
      opacity: 0.04;
      top: -2rem;
      right: -2rem;
      line-height: 1;
    }

    .hero h2 {
      font-size: 2.8rem;
      color: var(--maize);
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .hero p {
      font-size: 1.2rem;
      color: #cce0f5;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Page header ── */
    .page-header {
      background: var(--blue);
      color: var(--white);
      padding: 2rem;
      border-bottom: 4px solid var(--maize);
    }

    .page-header h1 {
      color: var(--maize);
      font-size: 2rem;
    }

    /* ── Main content ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      min-height: 60vh;
    }

    /* ── Section headings ── */
    h2 {
      color: var(--blue);
      font-size: 1.7rem;
      border-bottom: 3px solid var(--maize);
      padding-bottom: 0.4rem;
      margin: 2rem 0 1rem;
    }

    h3 { color: var(--blue-mid); margin: 1.2rem 0 0.5rem; }

    a { color: var(--blue-mid); }
    a:hover { color: var(--maize-dark); }

    /* ── Mission box ── */
    .mission-box {
      background: var(--blue);
      color: var(--white);
      border-left: 8px solid var(--maize);
      border-radius: 4px;
      padding: 2rem 2.5rem;
      margin: 2rem 0;
    }

    .mission-box h2 {
      color: var(--maize);
      border-bottom-color: rgba(255,203,5,0.4);
    }

    .mission-box p { color: #dce8f5; margin-bottom: 0.8rem; }

    .mission-box ul {
      list-style: none;
      padding: 0;
    }

    .mission-box ul li {
      padding: 0.4rem 0 0.4rem 1.8rem;
      position: relative;
      color: #dce8f5;
    }

    .mission-box ul li::before {
      content: "🏹";
      position: absolute;
      left: 0;
      font-size: 0.9rem;
    }

    /* ── Coach cards ── */
    .coaches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .coach-card {
      background: var(--white);
      border: 1px solid #ddd;
      border-top: 5px solid var(--maize);
      border-radius: 4px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,39,76,0.08);
    }

    .coach-card h3 {
      color: var(--blue);
      font-size: 1.2rem;
      margin-top: 0;
    }

    .coach-card .role {
      color: var(--maize-dark);
      font-weight: bold;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.8rem;
    }

    .coach-card p { font-size: 0.95rem; color: #444; }

    .coach-card .cert-badge {
      display: inline-block;
      background: var(--blue);
      color: var(--maize);
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 3px;
      margin: 0.2rem 0.2rem 0 0;
    }

    /* ── Single coach page ── */
    .coach-single {
      background: var(--white);
      border-top: 6px solid var(--maize);
      border-radius: 4px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,39,76,0.1);
      max-width: 800px;
    }

    .coach-single blockquote {
      border-left: 4px solid var(--maize);
      background: var(--off-white);
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      font-style: italic;
      color: var(--blue);
    }

    /* ── Calendar ── */
    .calendar-section { margin-bottom: 2.5rem; }

    .calendar-month {
      background: var(--white);
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,39,76,0.07);
      margin-bottom: 2rem;
    }

    .calendar-month-header {
      background: var(--blue);
      color: var(--maize);
      padding: 0.8rem 1.2rem;
      font-size: 1.1rem;
      font-weight: bold;
      font-family: Arial, sans-serif;
      letter-spacing: 0.05em;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .cal-day-name {
      background: var(--blue-mid);
      color: var(--maize);
      text-align: center;
      padding: 0.5rem;
      font-size: 0.75rem;
      font-weight: bold;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
    }

    .cal-day {
      border: 1px solid #eee;
      min-height: 80px;
      padding: 0.4rem;
      vertical-align: top;
      font-size: 0.8rem;
    }

    .cal-day.empty { background: #fafafa; }

    .cal-day .day-num {
      font-weight: bold;
      color: var(--blue);
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
    }

    .cal-event {
      background: var(--maize);
      color: var(--blue);
      border-radius: 3px;
      padding: 0.15rem 0.4rem;
      margin-bottom: 0.2rem;
      font-size: 0.72rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .cal-event.practice { background: #cce5ff; color: #003d73; }
    .cal-event.tournament { background: var(--maize); color: var(--blue); }
    .cal-event.meeting { background: #d4edda; color: #155724; }
    .cal-event.special { background: #f8d7da; color: #721c24; }

    .event-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }

    /* ── Footer ── */
    footer {
      background: var(--blue);
      border-top: 5px solid var(--maize);
      color: #aac4e0;
      text-align: center;
      padding: 1.5rem 2rem;
      font-size: 0.85rem;
      font-family: Arial, sans-serif;
    }

    footer strong { color: var(--maize); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .header-top { flex-direction: column; gap: 0.8rem; text-align: center; }
      .hero h2 { font-size: 1.8rem; }
      .cal-day { min-height: 55px; }
      .cal-event { font-size: 0.65rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <a href="/" class="site-brand">
        <span class="brand-icon">🏹</span>
        <div class="brand-text">
          <h1>{{ site.Title }}</h1>
          <span class="tagline">{{ site.Params.tagline }}</span>
        </div>
      </a>
    </div>
    <nav>
      <ul>
        {{ range site.Menus.main }}
        <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </header>

  {{ block "main" . }}{{ end }}

  <footer>
    <p><strong>Grand Ledge Archery</strong> &mdash; Grand Ledge, Michigan</p>
    <p style="margin-top:0.4rem">&copy; {{ now.Year }} Grand Ledge Archery. All rights reserved.</p>
  </footer>
</body>
</html>
