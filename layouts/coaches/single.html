{{ define "main" }}
<div class="page-header">
  <div style="max-width:1100px;margin:0 auto;padding:0 2rem;">
    <h1>{{ .Params.name | default .Title }}</h1>
    {{ with .Params.role }}<p style="color:#aac4e0;font-size:1rem;margin-top:0.3rem;">{{ . }}</p>{{ end }}
  </div>
</div>
<main>
  <a href="/coaches/" style="font-size:0.9rem;font-family:Arial,sans-serif;">← Back to Coaches</a>
  <div class="coach-single" style="margin-top:1.5rem;">
    {{ with .Params.certifications }}
      <div style="margin-bottom:1.2rem;">
        {{ range . }}<span class="cert-badge">{{ . }}</span>{{ end }}
      </div>
    {{ end }}
    {{ .Content }}
  </div>
</main>
{{ end }}
